<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Grimório do Aventureiro">
  <defs>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b1c1c"/>
      <stop offset="100%" stop-color="#3d1010"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4e4c1"/>
      <stop offset="100%" stop-color="#e0c994"/>
    </linearGradient>
  </defs>
  <!-- Book cover -->
  <rect x="10" y="8" width="44" height="48" rx="3" fill="url(#cover)" stroke="#8b6914" stroke-width="2"/>
