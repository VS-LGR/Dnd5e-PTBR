  <path d="M35 30 L43 30 L35 44 Z" fill="#4a1212"/>
  <text x="35" y="34.5" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="700" fill="#f4e4c1">20</text>
</svg>
